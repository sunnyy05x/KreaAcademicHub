<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krea Academic Hub — Scheduler · Help Desk · Peer Network</title>
  <meta name="description"
    content="Krea Academic Hub: Book office hours, solve doubts, and find peer tutors — all in one place." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🎓</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo-container">
          <img src="/krea-logo.png" alt="Krea Logo" class="brand-logo-img">
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Dynamically rendered by main.js based on active role -->
      </nav>

      <div class="sidebar-footer" id="sidebarFooter">
        <!-- Dynamically rendered user card + role switcher -->
      </div>
    </aside>

    <!-- Mobile header -->
    <header class="topbar" id="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-brand">
        <div class="brand-logo-container topbar-logo">
          <img src="/krea-logo.png" alt="Krea Logo" class="brand-logo-img">
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn notif-btn" id="notifBtn" aria-label="Notifications">
          <span id="icon-bell"></span>
          <span class="notif-dot"></span>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content" id="mainContent">
      <!-- Pages will be injected here -->
    </main>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
